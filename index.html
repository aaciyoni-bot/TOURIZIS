                                                </div>

                                            <div className="flex-1 w-full relative perspective-1000 hidden lg:block">
                                                <div className="aspect-square max-w-md mx-auto bg-gradient-to-br from-neutral-800 to-neutral-950 rounded-[3rem] border border-white/10 flex items-center justify-center overflow-hidden shadow-2xl relative group rotate-3 hover:rotate-0 transition-transform duration-700">
                                                    <div className="absolute inset-0 bg-amber-500/5 group-hover:bg-amber-500/15 transition-colors duration-700"></div>
                                                    <div className="w-64 h-64 rounded-full border-4 border-amber-500/20 flex items-center justify-center relative">
                                                        <div className="w-48 h-48 rounded-full border border-amber-500/40 flex items-center justify-center animate-[spin_15s_linear_infinite]">
                                                            <div className="absolute top-0 w-4 h-4 bg-amber-400 rounded-full shadow-[0_0_15px_#fbbf24]"></div>
                                                            <div className="absolute bottom-0 w-2 h-2 bg-amber-600 rounded-full"></div>
                                                        </div>
                                                        <div className="absolute text-amber-500/40 w-20 h-20 animate-pulse">
                                                            <Icons.Diamond />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Packages Grid */}
                                <div id="packages" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 relative z-10">
                                    <div className="text-center mb-20">
                                        <h2 className="text-4xl md:text-6xl heading-font mb-6 text-white">המסלולים שלנו</h2>
                                        <p className="text-amber-500 text-xl md:text-2xl font-bold">אתם מזמינים טיסה. אנחנו דואגים לכל השאר.</p>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                        {PACKAGES.map((pkg) => (
                                            <div key={pkg.id} className={`bg-neutral-900/80 backdrop-blur-xl rounded-3xl overflow-hidden flex flex-col transition-all duration-500 hover:-translate-y-4 hover:shadow-2xl border ${pkg.popular ? 'border-amber-400 shadow-[0_0_30px_rgba(245,158,11,0.15)] relative z-20 scale-105' : 'border-white/5 hover:border-white/20'}`}>
                                                {pkg.popular && (
                                                    <div className="bg-gradient-to-r from-amber-300 via-amber-500 to-amber-300 text-neutral-950 text-center py-2 text-sm font-black tracking-widest uppercase shadow-md">
                                                        ★ הבחירה המועדפת ★
                                                    </div>
                                                )}
                                                <div className="p-8 flex-grow flex flex-col relative">
                                                    <div className="absolute top-6 left-6 text-white/5 w-20 h-20 pointer-events-none">
                                                        {pkg.isGroup ? <Icons.User /> : <Icons.Crown />}
                                                    </div>
                                                    <h3 className="text-2xl heading-font mb-2 text-white">{pkg.title}</h3>
                                                    <p className="text-sm text-amber-500 font-bold mb-6 h-10">{pkg.subtitle}</p>
                                                    <div className="mb-6 pb-6 border-b border-white/10">
                                                        <span className="text-5xl font-black text-white">${pkg.basePrice}</span>
                                                        <span className="text-neutral-500 text-sm ml-1 font-bold">{pkg.priceSuffix || '/ לאדם'}</span>
                                                    </div>
                                                    <p className="text-neutral-300 text-sm mb-8 leading-relaxed h-24 font-medium">{pkg.description}</p>
                                                    <ul className="space-y-4 mb-8 flex-grow">
                                                        {pkg.includes.map((item, i) => (
                                                            <li key={i} className="flex items-start text-sm text-neutral-300 font-bold">
                                                                <div className="mt-0.5 ml-3 flex-shrink-0"><Icons.Check /></div>
                                                                <span className="leading-tight">{item}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                                <div className="p-6 bg-neutral-950/50 mt-auto border-t border-white/5">
                                                    <button onClick={() => { setSelectedPkg(pkg); setView('booking'); }} className={`w-full font-bold py-4 rounded-xl text-lg transition-all duration-300 ${pkg.popular ? 'bg-gradient-to-r from-amber-500 to-amber-400 text-neutral-950 hover:shadow-[0_0_20px_rgba(245,158,11,0.4)]' : 'bg-white text-neutral-950 hover:bg-neutral-200'}`}>
                                                        {pkg.basePrice === 0 ? 'לשריין מקום בחינם' : 'לשריין תאריכים'}
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Become a Rep Section */}
                                <div className="bg-neutral-900 border-t border-white/5 py-16 relative z-10">
                                    <div className="max-w-4xl mx-auto px-4 text-center">
                                        <div className="inline-block bg-amber-500/10 p-4 rounded-full mb-6">
                                            <Icons.Admin />
                                        </div>
                                        <h3 className="text-3xl heading-font text-white mb-4">שותפים להצלחה</h3>
                                        <p className="text-neutral-400 text-lg mb-8 font-medium">
                                            רוצה להיות הנציג הרשמי של מנדרין ורויאל קזינו באזורך? הצטרף לרשת הסוכנים שלנו ותתחיל להרוויח עמלות על כל אורח שתפנה למסלולי האירוח שלנו.
                                        </p>
                                        <a 
                                            href={`https://wa.me/${WA_NUMBER}?text=${WA_MSG_REP}`}
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            className="inline-flex items-center gap-3 bg-white text-neutral-950 font-black py-4 px-8 rounded-xl hover:bg-neutral-200 transition-colors"
                                        >
                                            <Icons.WhatsApp /> שלח הודעה לפרטים והרשמה
                                        </a>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'booking' && selectedPkg && (
                            <BookingWizard pkg={selectedPkg} onBack={() => setView('home')} onComplete={handleBookingComplete} />
                        )}

                        {view === 'adminLogin' && <AdminPanel setView={setView} />}
                    </main>

                    {/* Global Footer */}
                    {view !== 'adminLogin' && view !== 'onlineDemo' && (
                        <footer className="bg-neutral-950 border-t border-white/5 py-12 text-center relative z-10">
                            <div className="max-w-7xl mx-auto px-4">
                                <div className="text-2xl heading-font text-white tracking-widest mb-4">TOURI<span className="text-amber-500">ZIS</span></div>
                                <p className="text-neutral-500 text-sm mb-6 font-bold">Exclusive Casino Tourism • Batumi</p>
                                <p className="mt-12 text-xs text-neutral-700 font-medium">© 2026 TOURIZIS. All rights reserved. Play Responsibly.</p>
                            </div>
                        </footer>
                    )}

                    <MessageBox 
                        isOpen={msgBox.isOpen} 
                        title={msgBox.title} 
                        message={msgBox.message} 
                        type={msgBox.type}
                        onClose={() => setMsgBox({...msgBox, isOpen: false})} 
                    />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
